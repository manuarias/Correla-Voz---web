
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Correla Voz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;600;700&family=Rye&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/wc-mano-negra" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #000000; /* black */
        background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%230f172a' fill-opacity='0.2'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      }
      h1 {
        font-family: 'Rye', cursive;
      }
      h2 {
        font-family: 'WC Mano Negra Bta', sans-serif;
                                                
      } 
      h3, h4 {
        font-family: 'Bungee', cursive;
      }
      h2 {
        text-shadow: -1.5px -1.5px 0 #000, 1.5px -1.5px 0 #000, -1.5px 1.5px 0 #000, 1.5px 1.5px 0 #000;
      }
      @keyframes modal-enter {
        from { opacity: 0; transform: scale(0.95) translateY(10px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }
      .animate-modal-enter {
        animation: modal-enter 0.2s ease-out forwards;
      }

      @keyframes kenburns {
        0% {
          transform: scale(1) translate(0, 0);
        }
        100% {
          transform: scale(1.05) translate(-1%, 1%);
        }
      }
      .animate-kenburns {
          animation: kenburns 40s ease-in-out infinite alternate;
      }

      @keyframes text-enter {
          from { opacity: 0; transform: translateY(20px); }
          to { opacity: 1; transform: translateY(0); }
      }
      .animate-text-enter-delay {
          animation: text-enter 1s ease-out 0.8s forwards;
          opacity: 0;
      }

      /* --- Custom Colors --- */
      .text-murga-turquoise {
        color: #42a9c2;
      }

      /* --- Glow Animation --- */
      @keyframes murga-glow {
        0%, 100% {
          /* Red Glow */
          text-shadow: 0 0 5px rgba(255, 255, 255, 0.4), 
                       0 0 15px rgba(229, 62, 62, 0.7), 
                       0 0 30px rgba(229, 62, 62, 0.6);
        }
        33% {
          /* Turquoise Glow */
          text-shadow: 0 0 5px rgba(255, 255, 255, 0.4), 
                       0 0 15px rgba(66, 169, 194, 0.9), 
                       0 0 30px rgba(66, 169, 194, 0.8);
        }
        66% {
          /* White Glow */
          text-shadow: 0 0 8px rgba(255, 255, 255, 0.9), 
                       0 0 15px rgba(255, 255, 255, 0.8), 
                       0 0 25px rgba(255, 255, 255, 0.6);
        }
      }
      .animate-murga-glow {
        animation: murga-glow 6s ease-in-out infinite;
      }
      
      /* --- Soft Glow Animation for H2 --- */
      @keyframes murga-glow-soft {
        0%, 100% {
          text-shadow: -1.5px -1.5px 0 #000, 1.5px -1.5px 0 #000, -1.5px 1.5px 0 #000, 1.5px 1.5px 0 #000,
                       0 0 6px rgba(229, 62, 62, 0.5), 
                       0 0 12px rgba(229, 62, 62, 0.4);
        }
        50% {
          text-shadow: -1.5px -1.5px 0 #000, 1.5px -1.5px 0 #000, -1.5px 1.5px 0 #000, 1.5px 1.5px 0 #000,
                       0 0 6px rgba(66, 169, 194, 0.6), 
                       0 0 12px rgba(66, 169, 194, 0.5);
        }
      }

      .animate-murga-glow-soft {
        animation: murga-glow-soft 8s ease-in-out infinite;
      }

      /* --- Carnival Border for Rehearsal Box --- */
      .carnival-border {
        border: 6px dotted #f59e0b; /* amber-500 */
        border-radius: 1rem;
        box-shadow: 0 0 15px rgba(245, 158, 11, 0.5), inset 0 0 15px rgba(245, 158, 11, 0.2);
        animation: lights-pulse 3s ease-in-out infinite alternate;
      }

      @keyframes lights-pulse {
        from {
          border-color: #f59e0b; /* amber-500 */
          box-shadow: 0 0 10px rgba(245, 158, 11, 0.4), inset 0 0 5px rgba(245, 158, 11, 0.1);
        }
        to {
          border-color: #fcd34d; /* amber-300 */
          box-shadow: 0 0 25px rgba(252, 211, 77, 0.8), inset 0 0 15px rgba(252, 211, 77, 0.4);
        }
      }

      /* --- Confetti Effect --- */
      @keyframes fall {
          0% {
              transform: translateY(-20px) rotate(0deg);
              opacity: 1;
          }
          100% {
              transform: translateY(100vh) rotate(720deg);
              opacity: 0;
          }
      }

      .confetti-piece {
          position: fixed;
          top: -20px;
          width: 5px;
          height: 11px;
          animation: fall linear infinite;
          will-change: transform, opacity;
      }
      
      /* --- Particle Explosion --- */
      .particle-explosion {
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
        animation: particle-fly 1000ms ease-out forwards;
        will-change: transform, opacity;
      }

      @keyframes particle-fly {
        0% {
          transform: translate(-50%, -50%) scale(1);
          opacity: 1;
        }
        100% {
          transform: var(--transform-end);
          opacity: 0;
        }
      }

      /* --- Firework Rocket --- */
      .firework-rocket-container {
        position: fixed;
        right: 40px; /* Aligned with center of button */
        bottom: 20px; /* Initial position */
        z-index: 50;
        will-change: bottom;
        pointer-events: none;
      }
      .firework-rocket {
        width: 6px;
        height: 20px;
        background: linear-gradient(to top, #ff5722, #ffc107);
        border-radius: 50% 50% 0 0;
        box-shadow: 0 0 6px rgba(255, 193, 7, 0.7), 0 0 3px white inset;
        position: relative;
        transform: translateX(-50%);
      }
      
      .rocket-spark {
        position: absolute;
        top: 100%; /* Position at the bottom of the rocket */
        width: 3px;
        height: 3px;
        background: #ffc107;
        border-radius: 50%;
        box-shadow: 0 0 5px #ffc107, 0 0 2px white;
        opacity: 0;
        animation: spark-flicker 0.6s ease-out infinite;
      }

      @keyframes spark-flicker {
        0% {
          transform: translate(-50%, 0) scale(1);
          opacity: 1;
        }
        100% {
          transform: translate(-50%, 25px) scale(0);
          opacity: 0;
        }
      }

      /* Hide scrollbar for Chrome, Safari and Opera */
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .scrollbar-hide {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }
    </style>

{

  }
}
</script>
</head>
  <body class="text-white">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
